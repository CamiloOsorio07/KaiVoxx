[phases.setup]
nixPkgs = [
  "python312",
  "ffmpeg",
  "libopus",
  "libogg",
  "libsodium",
  "pkg-config"
]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  "export SODIUM_LIB_DIR=/nix/store/*-libsodium-*/lib && export PKG_CONFIG_PATH=/nix/store/*-libsodium-*/lib/pkgconfig && . /opt/venv/bin/activate && pip install -r requirements.txt"
]

[start]
cmd = "export LD_LIBRARY_PATH=/nix/store/*-libsodium-*/lib:$LD_LIBRARY_PATH && export PKG_CONFIG_PATH=/nix/store/*-libsodium-*/lib/pkgconfig:$PKG_CONFIG_PATH && . /opt/venv/bin/activate && python3 main.py"
